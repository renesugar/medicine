title: "Translational Medicine"
description: "Clinical frameworks, diagnostic guides, and treatment protocols for translational medicine."
author: "Clinical Research Group"
url: ""
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
theme: null

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
  - scope:
      path: "articles"
      type: "pages"
    values:
      layout: "article"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
